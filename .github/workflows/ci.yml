name: AgentOrg CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on all .sh files
        run: |
          shfiles=$(find . -name '*.sh' -type f)
          if [ -z "$shfiles" ]; then
            echo "No .sh files found"
            exit 0
          fi
          echo "$shfiles" | xargs shellcheck

  validate:
    name: Validate Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y python3 jq
      - name: Run validation tests
        run: |
          chmod +x tests/run-all.sh
          ./tests/run-all.sh

  docker:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create minimal .env for validation
        run: |
          cp .env.example .env
          echo "OPENCLAW_GATEWAY_TOKEN=ci-validation-token" >> .env
      - name: Validate docker-compose.yml
        run: docker compose config --quiet
