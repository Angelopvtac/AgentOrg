name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: Greet first-timer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! We'll take a look soon.

            Before we dig in, please make sure:
            - You're using the latest version (check `VERSION`)
            - Your `.env` is configured per `.env.example`
            - You've run `./tests/run-all.sh` locally

            If this is a bug, include steps to reproduce. If it's a feature request, describe the use case.
          pr-message: |
            Thanks for your first PR! Here's what happens next:

            1. CI will run shellcheck, validation tests, and Docker checks
            2. A maintainer will review your changes
            3. Please make sure `./tests/run-all.sh` passes locally before requesting review

            Check [CONTRIBUTING.md](CONTRIBUTING.md) if you haven't already.
