services:
  agentorg-gateway:
    image: openclaw:local
    container_name: agentorg-gateway
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?Gateway token required - run scripts/setup.sh}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
    volumes:
      # Gateway config (read-only — agents must not modify gateway config)
      - ./config/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      # Agent workspaces
      - ./agents/orchestrator/workspace:/home/node/.openclaw/workspace-orchestrator
      - ./agents/core-assistant/workspace:/home/node/.openclaw/workspace-core-assistant
      # Shared knowledge (vault)
      - ./knowledge:/home/node/.openclaw/vault
      # Shared skills (read-only — skill definitions are static)
      - ./skills:/home/node/.openclaw/skills:ro
      # Runtime state — persists in named volumes, not committed to git
      - agentorg-agents:/home/node/.openclaw/agents
      - agentorg-cron:/home/node/.openclaw/cron
      - agentorg-credentials:/home/node/.openclaw/credentials
    # Ports bound to 127.0.0.1 (localhost only) — never change to 0.0.0.0 or remove
    # the prefix, as this would expose the gateway to the network without auth.
    ports:
      - "127.0.0.1:${OPENCLAW_GATEWAY_PORT:-18791}:18789"
      - "127.0.0.1:${OPENCLAW_BRIDGE_PORT:-18792}:18790"
    init: true
    restart: unless-stopped
    # Security hardening
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '4.0'
        reservations:
          memory: 512M
    tmpfs:
      - /tmp:size=256M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:18789/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
      ]

volumes:
  agentorg-agents:
  agentorg-cron:
  agentorg-credentials:
