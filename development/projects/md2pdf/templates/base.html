<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if title %}<title>{{ title }}</title>{% endif %}
    {% for css_file in css_files %}
    <style>{{ css_file }}</style>
    {% endfor %}
    {% if extra_css %}
    <style>{{ extra_css }}</style>
    {% endif %}
</head>
<body>
{{ content }}
</body>
</html>
